<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRA Unit Comparator — Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2236;
            --border: #1e2a45;
            --border-light: #2a3a5c;
            --text-primary: #e8edf5;
            --text-secondary: #8892a8;
            --text-muted: #5a647a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --accent-red: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

        .header { text-align: center; padding: 3rem 0 2rem; }
        .header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #e8edf5 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { color: var(--text-secondary); margin-top: 0.75rem; }

        .create-bar {
            display: flex; gap: 0.75rem; margin-bottom: 2rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem;
        }
        .create-bar input {
            flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border-light);
            border-radius: 8px; padding: 0.75rem 1rem; color: var(--text-primary);
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
        }
        .create-bar input::placeholder { color: var(--text-muted); }
        .create-bar input:focus { outline: none; border-color: var(--accent); }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.25rem; border-radius: 8px; font-size: 0.9rem;
            font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer;
            border: none; transition: all 0.2s; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; box-shadow: 0 0 20px var(--accent-glow); }
        .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.5); }

        .profile-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .profile-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.25rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.2s; cursor: pointer;
        }
        .profile-card:hover { background: var(--bg-card-hover); border-color: var(--accent); }
        .profile-info h3 { font-size: 1.1rem; font-weight: 600; }
        .profile-info span { font-size: 0.8rem; color: var(--text-muted); }
        .profile-actions { display: flex; gap: 0.5rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 1.5rem; opacity: 0.4; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header fade-in">
            <h1>OpenRA Unit Comparator</h1>
            <p>Create profiles, upload YAML files, and compare units.</p>
        </header>

        <div class="create-bar fade-in">
            <input type="text" id="profileName" placeholder="Enter profile name..." onkeydown="if(event.key==='Enter')createProfile()">
            <button class="btn btn-primary" onclick="createProfile()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Create Profile
            </button>
        </div>

        <div class="profile-list" id="profileList">
            <tr th:each="profile : ${profiles}">
                <div class="profile-card fade-in" onclick="location.href='/profiles/' + this.querySelector('.profile-id').textContent" style="cursor:pointer;">
                    <span class="profile-id" style="display:none;" th:text="${profile.id}"></span>
                    <div class="profile-info">
                        <h3 th:text="${profile.name}">-</h3>
                        <span th:text="${#temporals.format(profile.createdAt, 'dd.MM.yyyy HH:mm')}">-</span>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-danger" onclick="event.stopPropagation(); deleteProfile(this.closest('.profile-card').querySelector('.profile-id').textContent)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                            Delete
                        </button>
                    </div>
                </div>
            </tr>
            <div th:if="${#lists.isEmpty(profiles)}" class="empty-state fade-in">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                <h3>No profiles yet</h3>
                <p>Create a profile to upload YAML files and compare units.</p>
            </div>
        </div>
    </div>

    <script>
        function createProfile() {
            const input = document.getElementById('profileName');
            const name = input.value.trim();
            if (!name) return;

            fetch('/api/profiles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'name=' + encodeURIComponent(name)
            }).then(r => r.text()).then(d => {
                const result = JSON.parse(d);
                if (result.success) location.reload();
                else alert(result.message);
            });
        }

        function deleteProfile(id) {
            if (!confirm('Profil wirklich löschen? Alle Einheiten und Dateien werden entfernt.')) return;
            fetch('/api/profiles/' + id, { method: 'DELETE' })
                .then(() => location.reload());
        }
    </script>
</body>
</html>
